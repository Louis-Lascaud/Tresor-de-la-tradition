<body>
	<center>
<form>
    <label for="pswd">Entrer le mot de passe : </label>

</form>

<!--Function to check password the already set password is right-->
<script type="text/javascript">
    function checkPswd() {
        var confirmPassword = "iloveclapier";
        var password = document.getElementById("pswd").value;
        if (password == confirmPassword) {
             window.location="cryptedspace.html";
        }
        else{
            alert("Mot de passe incorrect.");
        }
    }
</script>
